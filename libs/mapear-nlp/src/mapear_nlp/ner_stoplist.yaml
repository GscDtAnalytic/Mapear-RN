# Stoplist NER – MAPEAR-RN (pt-BR)
#
# Substantivos comuns e cargos genéricos que spaCy/GCP frequentemente marcam
# como PERSON mesmo sem se referir a um indivíduo específico.
# Termos acentuados são mantidos para leitura humana; ner_postprocessing
# normaliza (sem acento, minúsculas) ao carregar o arquivo.
#
# Para adicionar novos termos: edite a seção adequada e faça o deploy.
# A normalização garante que "Deputado", "dèputado" e "deputado" tratados igual.

